services:

  ##########################################
  # Service: Traefik reverse proxy and load balancer
  ##########################################
  proxy:
    image: traefik:v3.6
    command: --providers.docker
    ports:
      - 80:80
      - 443:443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

