#####################################
## KPTN Main FrontEnd - NGINX configuration
#####################################
# Based on /etc/nginx/nginx.conf from Docker image 'nginx:1.31-alpine'
# Doc: https://nginx.org/en/docs/beginners_guide.html

user nginx;
worker_processes auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    include /etc/nginx/conf.d/*.conf;


    ###############
    # Server Block
    ###############
    server {
        listen 80;
        server_name kptn.local www.kptn.local;

        # Root directory for static files
        root /usr/share/nginx/html;

        # Default location
        location / {
            index index.html index.htm;
        }

        # Custom error pages
        # todo... funkar inte, oklart varför
        # error_page 404 /usr/share/nginx/html/error_pages/404.html;
    }
}
