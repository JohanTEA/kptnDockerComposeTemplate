<html>

<head>
  <script>
    console.log("KPTN App1 go!");

    fetch('http://app1.localhost/api/status')
      .then(response => {
        if (!response.ok) throw new Error('Network response was not ok');
        return response.json();
      })
      .then(data => {
        document.getElementById("apiStatus").innerHTML = JSON.stringify(data);
      })
      .catch(error => console.error('Error:', error));
  </script>
</head>

<body>
  <h1>KPTN - App1 FrontEnd</h1>

  <p><a href="http://localhost">KPTN Main: http://localhost</a></p>

  <p>Backend status: <span id="apiStatus"></span></p>
</body>

</html>
