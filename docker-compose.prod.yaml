##########################################
# KPTN VPS Docker Compose configuration
##########################################

# Traefik dashboard: http://127.0.0.1:8080/
# KPTN Main: http://127.0.0.1/
# KPTN App1 FrontEnd: http://app1.127.0.0.1/
# KPTN App1 API health: http://app1.127.0.0.1/api/health


services:

  ##########################################
  # Service: Watchtower - Automatic deployment 
  ##########################################
  #watchtower:
  #  image: containrrr/watchtower
  #  command:
  #    - "--label-enable"
  #    - "--interval"
  #    - "30"
  #    - "--rolling-restart"
  #  volumes:
  #    - /var/run/docker.sock:/var/run/docker.sock

  ##########################################
  # Service: Traefik - Reverse proxy and load balancer
  ##########################################
  traefik:
    image: traefik:v3.7
    restart: always
    command:
      #- "--log.level=INFO"
      - "--log.level=ERROR"
      - "--accesslog=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--api.insecure=true"
      - "--entryPoints.websecure.address=:443"
      #- "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      #- "--certificatesresolvers.myresolver.acme.email=elliott@zenful.cloud"
      #- "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.address=:80"
      #- "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      #- "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      #- "--entryPoints.web.forwardedHeaders.insecure"
      #- "--entryPoints.websecure.forwardedHeaders.insecure"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      #- letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro

  ##########################################
  # Service: KPTN Main FrontEnd
  ##########################################
  kptn-main-frontend:
    image: kptn-main-frontend:latest
    restart: always
    labels:
      #- "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.kptn-main-frontend.rule=Host(`localhost`)"

  ##########################################
  # Service: KPTN App1 FrontEnd
  ##########################################
  kptn-app1-frontend:
    image: kptn-app1-frontend:latest
    restart: always
    labels:
      #- "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.kptn-app1-frontend.rule=Host(`app1.localhost`)"

  ##########################################
  # Service: KPTN App1 BackEnd
  ##########################################
  kptn-app1-backend:
    image: kptn-app1-backend:latest
    restart: always
    labels:
      #- "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.kptn-app1-backend.rule=Host(`api.app1.localhost`)"
      #- "traefik.http.routers.kptn-app1-backend.rule=Host(`app1.localhost`) && Path(`/apiet`)"
    #depends_on:
    #  db:
    #    condition: service_healthy
